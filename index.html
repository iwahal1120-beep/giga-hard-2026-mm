<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>GIGA-HARD 2026 - FINAL MISSION</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { touch-action: manipulation; box-sizing: border-box; }
        body { margin: 0; background: #fff5e6; color: #333; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }
        
        /* 心を揺さぶるトップ画面 */
        #welcome { position: fixed; inset: 0; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .hero-title { font-size: 42px; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.2); margin: 0; }
        .support-card { width: 90%; max-width: 400px; background: #fff; border-radius: 30px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); margin: 25px 0; }
        .btn-ofuse { display: block; background: #ed6c00; color: #fff; text-decoration: none; padding: 20px; border-radius: 50px; font-size: 20px; font-weight: bold; box-shadow: 0 8px 0 #b35200; transition: 0.2s; }
        .btn-ofuse:active { transform: translateY(4px); box-shadow: 0 4px 0 #b35200; }

        /* UI部 */
        .hud { height: 70px; background: #fff; display: flex; align-items: center; justify-content: space-around; border-bottom: 5px solid #ffb3ba; position: relative; z-index: 100; }
        #timer { font-size: 38px; font-weight: bold; color: #ff6b6b; font-family: 'Courier New', monospace; }
        .game-area { width: 100vw; height: calc(100vh - 70px); background: #fff; position: relative; overflow: hidden; }

        /* ステージ5：白紙の中の究極点（rgba 0.05の極致） */
        .target-dot { position: absolute; width: 8px; height: 8px; background: rgba(0,0,0,0.05); border-radius: 50%; cursor: pointer; z-index: 500; }
        
        .item { position: absolute; cursor: pointer; z-index: 100; font-size: 28px; color: #000; }
        .dummy { position: absolute; pointer-events: none; font-size: 20px; opacity: 0.8; color: #000; }

        #fail { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        .btn-start { padding: 20px 60px; background: #ff6b6b; color: #fff; border: none; font-size: 26px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 8px 0 #d44d5c; }
        .legal { font-size: 11px; color: #999; text-align: left; max-width: 350px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div id="welcome">
    <h1 class="hero-title">GIGA-HARD 2026</h1>
    <p style="color:#fff; font-weight:bold; margin-top:10px;">善意の連鎖が、ここから始まる。</p>
    <div class="support-card">
        <a href="https://ofuse.me/d33e72b9" target="_blank" class="btn-ofuse" onclick="confetti()">OFUSEで寄付・応援 🎁</a>
        <p style="font-size:12px; color:#888; margin-top:15px;">手数料は運営、余剰金はUNICEF/MSFへ。</p>
    </div>
    <input type="text" id="p-name" placeholder="Name" style="padding:15px; border-radius:30px; border:none; width:80%; max-width:320px; text-align:center; font-size:18px; margin-bottom:20px;">
    <button onclick="boot()" class="btn-start">挑戦を開始する</button>
    <div class="legal">
        【規約】このゲームは2026.12.31まで不規則に進化し続けます。収益の分配は透明性を持って行われます。
    </div>
</div>

<div id="fail">
    <h2 style="font-size:50px; color:#ff6b6b; margin:0;">TIME UP</h2>
    <p>あなたの勇気は、まだ世界に届くはずです。</p>
    <button class="btn-start" onclick="location.reload()">RETRY</button>
</div>

<div class="hud">
    <div id="stg-n" style="font-weight:bold; color:#ffb3ba;">STAGE 1 / 26</div>
    <div id="timer">30.00</div>
</div>
<div class="game-area" id="field"></div>

<script>
let cur = 1, ms = 3000, active = false, found = 0;

// 【全26ステージ：魂の実装】
const stages = {
    1: {g:"🐶", c:["🌳","🏠"], num:400},
    2: {g:"🌈", c:["☁️","☀️"], num:500},
    3: {g:"🍀", c:["🌿","🍃"], num:600},
    4: {g:"🍰", c:["🍬","🍭"], num:700},
    5: {type:"GHOST", goals:5}, // 5番：白紙・薄点・究極の理不尽
    6: {g:"🦁", c:["🦒","🦓"], num:800},
    7: {g:"🐳", c:["🌊","⛵"], num:850},
    8: {g:"🦴", c:["🐟","🐠"], num:900},
    9: {g:"🔺", c:["🔻","🔶"], num:950, goals:5},
    10: {g:"あ", type:"mirror", num:800},
    11: {g:"⛩️", c:["🏢","🏨"], num:1000},
    12: {g:"🍒", c:["🍎","🍅"], num:900},
    13: {g:"🐛", c:["🍃","🌱"], num:900},
    14: {g:"🏆", c:["⚽","🏀"], num:900},
    15: {g:"🍌", c:["🌙","🌛"], num:950},
    16: {g:"🐼", c:["🐨","🐻"], num:1000, goals:5},
    17: {g:"🐙", c:["🦑","🦀"], num:1100},
    18: {g:"🛸", c:["✨","🌟"], num:1200, op:0.3},
    19: {g:"🍦", c:["🍭","🍩"], num:1000, goals:5},
    20: {g:"👀", c:["👁️"], num:1300, goals:3},
    21: {g:"💃", c:["🧔","👴"], num:1100, goals:5},
    22: {g:"■", c:["□"], num:1400, goals:5},
    23: {g:"🐥", c:["🥚","🐓"], num:1500, goals:5},
    24: {type:"FATE"},
    25: {type:"SPIRAL", goals:8},
    26: {g:"💖", c:["✨","🌸"], num:1800, goals:1}
};

function boot() {
    if(!document.getElementById('p-name').value) return;
    document.getElementById('welcome').style.display='none';
    render();
}

function render() {
    const f = document.getElementById('field'); f.innerHTML = ""; active = true; ms = 3000; found = 0;
    const s = stages[cur];
    document.getElementById('stg-n').innerText = `STAGE ${cur} / 26`;
    f.style.background = "#fff";

    if(s.type === "GHOST") {
        for(let i=0; i<5; i++) {
            const d = document.createElement('div'); d.className="target-dot";
            d.style.left=(5+Math.random()*90)+"%"; d.style.top=(5+Math.random()*90)+"%";
            d.onclick=()=>{d.style.display="none"; found++; if(found>=5) next();};
            f.appendChild(d);
        }
    } else if(s.type === "FATE") {
        const r=document.createElement('div'); r.style="position:absolute;left:20%;top:40%;width:100px;height:100px;background:#ff6b6b;border-radius:50%;cursor:pointer;";
        const b=document.createElement('div'); b.style="position:absolute;left:60%;top:40%;width:100px;height:100px;background:#4facfe;border-radius:50%;cursor:pointer;";
        let w = Math.random()>0.5?r:b;
        r.onclick=()=>r===w?next():location.reload();
        b.onclick=()=>b===w?next():location.reload();
        f.appendChild(r); f.appendChild(b);
    } else {
        if(s.num) {
            for(let j=0; j<s.num; j++){
                const d=document.createElement('div'); d.className="dummy";
                d.style.left=Math.random()*98+"%"; d.style.top=Math.random()*98+"%";
                d.innerText=s.c[j%s.c.length]; f.appendChild(d);
            }
        }
        const gls = s.goals || 1;
        for(let k=0; k<gls; k++){
            const t=document.createElement('div'); t.className="item";
            t.style.left=(5+Math.random()*90)+"%"; t.style.top=(5+Math.random()*90)+"%";
            t.innerText=s.g; if(s.type==="mirror") t.style.transform="scaleX(-1)";
            if(s.op) t.style.opacity=s.op;
            t.onclick=()=>{t.style.display="none"; found++; if(found>=gls) next();};
            f.appendChild(t);
        }
    }
}

function next() {
    active = false; confetti({particleCount:150, spread:70, origin:{y:0.6}});
    cur++;
    setTimeout(() => { if(cur<=26) render(); else alert("ALL CLEAR! YOU SAVED THE WORLD!"); }, 600);
}

setInterval(() => {
    if(!active) return;
    ms--;
    const t = document.getElementById('timer');
    if(ms <= 0) { active = false; t.innerText = "0.00"; document.getElementById('fail').style.display="flex"; return; }
    t.innerText = (ms/100).toFixed(2);
}, 10);
</script>
</body>
</html>
