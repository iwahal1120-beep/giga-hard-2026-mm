<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIGA-HARD Challenge RTA - 100,000 Yen Giveaway Game</title>
    <meta name="description" content="Ultimate RTA Browser Game. Complete all stages for a chance to win 100,000 Yen! #GigaHardRTA">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; user-select: none; margin: 0; touch-action: manipulation; }
        #game-area { height: calc(100vh - 120px); position: relative; background: #d1d5db; overflow: hidden; }
        .danger-mode #game-area { animation: menace-pink 0.15s infinite alternate !important; }
        .danger-mode #timer { color: #ff0000 !important; transform: scale(1.1); font-weight: 900; }
        @keyframes menace-pink { 0% { background: #d1d5db; } 100% { background: #ffb6c1; } }
        .emoji { position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
        .target { z-index: 10000; font-size: 1.5rem; } 
        .noise { z-index: 100; font-size: 1.2rem; }
        .yellow-dot { color: #facc15 !important; -webkit-text-fill-color: #facc15 !important; font-size: 1.1rem; }
        .black-text { color: #000 !important; -webkit-text-fill-color: #000 !important; }
        .thin-text { font-weight: 300 !important; font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; }
        @keyframes vibration { 0% { transform: translate(0,0); } 100% { transform: translate(2px, 1px); } }
        .shaking-noise { animation: vibration 0.05s infinite; color: #4b5563; }
        .hidden-square { color: #d1d5db !important; -webkit-text-fill-color: #d1d5db !important; }
        .small-clown { transform: scale(0.6) !important; }
        #spiral-canvas { position: absolute; inset: 0; z-index: 50; pointer-events: none; display: none; }
        .cut-point { position: absolute; width: 28px; height: 28px; z-index: 20000; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .gap-pixel { width: 3px; height: 3px; background: #d1d5db; border-radius: 50%; }
        .ranking-box { background: rgba(20, 20, 20, 0.9); border: 1px solid #444; width: 100%; border-radius: 12px; padding: 12px; margin-top: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ranking-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 4px 8px; font-size: 11px; font-family: 'Courier New', Courier, monospace; }
        .rank-num { color: #facc15; font-weight: bold; margin-right: 6px; }
        .share-btn { background: #1DA1F2; color: white; padding: 12px 24px; border-radius: 99px; font-weight: bold; margin-top: 15px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body id="main-body">

<div id="start-screen" class="fixed inset-0 z-[50000] p-6 flex flex-col items-center overflow-y-auto bg-black">
    <div class="max-w-md w-full flex flex-col items-center">
        <div class="w-full bg-zinc-900 rounded-2xl border-2 border-orange-500 overflow-hidden mb-6 shadow-[0_0_15px_rgba(249,115,22,0.5)]">
            <div class="bg-orange-600 p-3 text-center">
                <a id="donate-link" href="https://ofuse.me/d33e72b9" target="_blank" class="text-white font-black text-lg hover:underline decoration-white">OFUSE / Support & PW</a>
            </div>
            <div class="p-6 text-center bg-gradient-to-b from-zinc-800 to-zinc-900">
                <h2 id="promo-title" class="text-4xl md:text-5xl font-black text-yellow-400 mb-2 italic animate-pulse">10万円にチャレンジ！</h2>
                <p id="promo-date" class="text-red-500 font-bold text-lg mb-4">Ends Jan 1 2027</p>
            </div>
        </div>

        <h1 class="text-3xl font-black text-zinc-400 mb-4 italic uppercase tracking-tighter text-center">GIGA-HARD RTA</h1>
        
        <div class="bg-zinc-900/80 p-4 rounded-xl text-[10px] space-y-3 mb-4 border border-zinc-700 text-zinc-300 w-full text-center">
            <p id="important-text" class="text-white font-bold uppercase underline decoration-red-600 mb-2">【重要/IMPORTANT】</p>
            <p id="pw-text" class="text-yellow-400 font-bold mb-2 text-[11px]">Use same PW for game & OFUSE.</p>
        </div>

        <input type="text" id="name" placeholder="Nickname" class="w-full p-4 rounded-xl bg-zinc-800 mb-2 border border-zinc-600 outline-none text-white text-center">
        <input type="password" id="pw" maxlength="4" placeholder="4-digit PW" class="w-full p-4 rounded-xl bg-zinc-800 mb-6 border border-zinc-600 outline-none text-white text-center">
        <button onclick="start()" id="start-btn" class="w-full bg-red-700 py-5 rounded-2xl font-black text-2xl active:scale-95 italic uppercase shadow-xl transition border-b-4 border-red-900">START</button>
        <div class="ranking-box" id="ranking-list"></div>
    </div>
</div>

<header class="h-[120px] bg-black flex flex-col justify-center px-6 border-b border-zinc-800">
    <div class="flex justify-between items-start text-[11px] font-bold italic text-zinc-400 mb-1">
        <span id="stg" class="text-red-600 uppercase whitespace-nowrap mr-4">STAGE</span>
        <span id="target-text" class="text-white text-right leading-tight"></span>
    </div>
    <div id="timer" class="text-6xl font-mono font-black text-center tabular-nums">30.00</div>
</header>

<main id="game-area">
    <canvas id="spiral-canvas"></canvas>
</main>

<script>
    // 多言語辞書 (AI Translation 2026)
    const LANG = {
        ja: { stg:"ステージ", start:"全ステージ開始", title:"10万円にチャレンジ！", promo:"終了 2027.1.1", imp:"【重要】", pw:"同じPWを使用してください", find:"を探せ", clear:"完全制覇", rank:"ランキング", share:"結果をXでシェア" },
        en: { stg:"STAGE", start:"START ALL STAGES", title:"Win 100,000 Yen!", promo:"Ends 2027.1.1", imp:"[IMPORTANT]", pw:"Use the same PW", find:"Find", clear:"ULTIMATE COMPLETE", rank:"RTA RANKING", share:"Share on X" },
        es: { stg:"NIVEL", start:"EMPEZAR TODO", title:"¡Gana 100,000 Yen!", promo:"Finaliza 2027.1.1", imp:"[IMPORTANTE]", pw:"Usa la misma PW", find:"Encuentra", clear:"COMPLETADO", rank:"RANKING", share:"Compartir en X" },
        zh: { stg:"关卡", start:"开始挑战", title:"挑战10万日元！", promo:"截止 2027.1.1", imp:"【重要事项】", pw:"使用相同的密码", find:"寻找", clear:"完美通关", rank:"排行榜", share:"分享到X" },
        ko: { stg:"스테이지", start:"모든 스테이지 시작", title:"10만엔 챌린지!", promo:"종료 2027.1.1", imp:"【중요】", pw:"같은 비번을 사용하세요", find:"찾기", clear:"완전 제패", rank:"랭킹", share:"X에 공유" },
        pt: { stg:"NÍVEL", start:"INICIAR TUDO", title:"Ganhe 100,000 ienes!", promo:"Termina 2027.1.1", imp:"[IMPORTANTE]", pw:"Use a mesma senha", find:"Encontre", clear:"COMPLETADO", rank:"RANKING", share:"Compartilhar no X" }
    };

    const userLang = (navigator.language || navigator.userLanguage).split('-')[0];
    const L = LANG[userLang] || LANG.en;

    const STAGES = [
        {m:`🙋‍♂️ ${L.find}`, t:["🙋‍♂️"], n:["🐶","🐱","🐭"], c:500},
        {m:`🐱 ${L.find}`, t:["🐱"], n:["🧔","👵","👦"], c:500},
        {m:`🚲 ${L.find}`, t:["🚲"], n:["🚗","🚌","🚙"], c:500},
        {m:`🍪 ${L.find}`, t:["🍪"], n:["🍬","🍭","🍩"], c:500},
        {m:`🥈 ${L.find} (5)`, t:["🥈","🥈","🥈","🥈","🥈"], n:["●"], c:500, s:"s"},
        {m:`🤡 ${L.find}`, t:["🤡"], n:["💃","👱‍♀️"], c:500, s:"clown"},
        {m:`Flags ${L.find} (10)`, t:["🇯🇵","🇺🇸","🇫🇷","🇮🇹","🇨🇳","🇷🇺","🇬🇧","🇩🇪","🇰🇷","🇪🇸"], n:["🌍","🌎"], c:600},
        {m:`🦴 ${L.find}`, t:["🦴"], n:["🐟","🐠"], c:600},
        {m:`🌸 ${L.find}`, t:["🌸"], n:["⭐"], c:600},
        {m:`'あ' ${L.find} (5)`, t:["あ","あ","あ","あ","あ"], n:["あ"], c:450, s:"mi"},
        {m:`⛩ ${L.find}`, t:["⛩"], n:["🏢","🏣"], c:600},
        {m:`🍒 ${L.find}`, t:["🍒"], n:["🍎"], c:600},
        {m:`🐛 ${L.find}`, t:["🐛"], n:["🍃","🌱"], c:600},
        {m:`🏆 ${L.find}`, t:["🏆"], n:["⚽","🏀"], c:600},
        {m:`🍌 ${L.find}`, t:["🍌"], n:["🌙"], c:600},
        {m:`🐼 ${L.find}`, t:["🐼"], n:["🐨","🦁","🐯"], c:600},
        {m:`🐙 ${L.find}`, t:["🐙"], n:["🦑"], c:650},
        {m:`🛸 ${L.find}`, t:["🛸"], n:["✨","🌟"], c:700, s:"uf"},
        {m:`🍦 ${L.find} (5)`, t:["🍦","🍦","🍦","🍦","🍦"], n:["🍭"], c:600},
        {m:`👾 ${L.find}`, t:["👾"], n:["📱","💻","💾"], c:650},
        {m:`💃 ${L.find} (5)`, t:["💃","💃","💃","💃","💃"], n:["🧔"], c:600},
        {m:`■ ${L.find} (5)`, t:["■","■","■","■","■"], n:["■"], c:500, s:"sq"},
        {m:`🐥 ${L.find} (5)`, t:["🐥","🐥","🐥","🐥","🐥"], n:["🐓"], c:550},
        {m:"運命の二択 / Choice", s:"ch"},
        {m:`Spiral Gap ${L.find} (8)`, s:"sp"}
    ];

    let stg=0, time=3000, tid=null, found=0, totalTime=0, live=false;
    const area=document.getElementById('game-area'), canvas=document.getElementById('spiral-canvas'), ctx=canvas.getContext('2d'), 
          timerEl=document.getElementById('timer'), stgEl=document.getElementById('stg'), txtEl=document.getElementById('target-text'), 
          bodyEl=document.getElementById('main-body');

    window.onload = () => { 
        updateUI();
        updateRanking();
    };

    function updateUI() {
        document.getElementById('start-btn').innerText = L.start;
        document.getElementById('promo-title').innerText = L.title;
        document.getElementById('promo-date').innerText = L.promo;
        document.getElementById('important-text').innerText = L.imp;
        document.getElementById('pw-text').innerText = L.pw;
    }

    function updateRanking() {
        let ranks = JSON.parse(localStorage.getItem('giga-hard-rta-final')) || [];
        const listEl = document.getElementById('ranking-list');
        listEl.innerHTML = `<p class="text-[9px] text-zinc-500 mb-2 border-b border-zinc-800 pb-1 text-center">${L.rank}</p>`;
        ranks.sort((a,b) => a.score - b.score).slice(0, 10).forEach((r, i) => {
            const item = document.createElement('div');
            item.className = "ranking-item";
            item.innerHTML = `<span><span class="rank-num">${i+1}</span>${r.name}</span><span class="text-yellow-500 font-bold">${(r.score/100).toFixed(2)}s</span>`;
            listEl.append(item);
        });
    }

    function saveScore(name, score) {
        let ranks = JSON.parse(localStorage.getItem('giga-hard-rta-final')) || [];
        ranks.push({name: name, score: score});
        localStorage.setItem('giga-hard-rta-final', JSON.stringify(ranks.sort((a,b) => a.score - b.score).slice(0, 20)));
        updateRanking();
    }

    function start() {
        if(!document.getElementById('name').value) return alert("Nickname required");
        document.getElementById('start-screen').style.display='none';
        stg=0; totalTime=0; live=true; loadStage();
        if(!tid) tid=setInterval(tick, 10);
    }

    function tick() {
        if(!live) return;
        time--; totalTime++;
        timerEl.innerText = (time/100).toFixed(2);
        if(time <= 1000) bodyEl.classList.add('danger-mode');
        if(time <= 0) endGame(false);
    }

    function loadStage() {
        area.querySelectorAll('.emoji, .cut-point, .ch-wrap').forEach(el => el.remove());
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.style.display = "none";
        found=0; time=3000;
        bodyEl.classList.remove('danger-mode');
        const s = STAGES[stg];
        stgEl.innerText = `${L.stg} ${stg+1}/${STAGES.length}`;
        txtEl.innerText = s.m;
        
        if(s.s==='ch') {
            const wrap = document.createElement('div'); wrap.className = "ch-wrap flex h-full w-full items-center justify-around";
            const ok = Math.random()>0.5;
            ["RED","BLUE"].forEach((c, i) => {
                const b=document.createElement('button'); b.className=`w-32 h-32 bg-${c.toLowerCase()}-600 rounded-full font-black text-white text-xl`; b.innerText=c;
                b.onclick=()=>{ (i===0 && ok) || (i===1 && !ok) ? nextStage() : endGame(false); }; wrap.append(b);
            });
            area.append(wrap);
        } else if(s.s==='sp') {
            canvas.style.display = "block"; canvas.width = area.clientWidth; canvas.height = area.clientHeight;
            drawSpiral(70);
            for(let i=0; i<8; i++) {
                const cut = document.createElement('div'); cut.className = "cut-point";
                const dot = document.createElement('div'); dot.className = "gap-pixel";
                cut.append(dot); cut.style.left = Math.random()*80+10+"%"; cut.style.top = Math.random()*80+10+"%";
                cut.onclick = () => { dot.style.background = "#22c55e"; dot.style.width = "10px"; dot.style.height = "10px"; cut.onclick = null; found++; if(found >= 8) nextStage(); };
                area.append(cut);
            }
        } else {
            for(let i=0; i<s.c; i++) {
                const n=document.createElement('div'); n.className="emoji noise";
                n.innerText=s.n[i%s.n.length]; n.style.left=Math.random()*94+"%"; n.style.top=Math.random()*94+"%";
                if(s.s==='s') n.classList.add('yellow-dot');
                if(s.s==='sq') n.classList.add('shaking-noise');
                if(s.s==='mi') n.classList.add('black-text', 'thin-text');
                n.onclick=()=>{ time=Math.max(0,time-300); }; area.append(n);
            }
            s.t.forEach(emoji => {
                const g=document.createElement('div'); g.className="emoji target"; g.innerText=emoji;
                g.style.left=Math.random()*90+2+"%"; g.style.top=Math.random()*90+2+"%";
                if(s.s==='clown') g.classList.add('small-clown');
                if(s.s==='mi') { g.classList.add('black-text', 'thin-text'); g.style.transform="scaleX(-1)"; }
                if(s.s==='uf') g.style.opacity="0.2";
                if(s.s==='sq') g.classList.add('hidden-square');
                g.onclick=(e)=>{ e.stopPropagation(); g.style.visibility='hidden'; found++; if(found >= s.t.length) nextStage(); };
                area.append(g);
            });
        }
    }
    function drawSpiral(turns) {
        ctx.beginPath(); ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
        const centerX = canvas.width / 2, centerY = canvas.height / 2;
        for (let i = 0; i < turns * 360; i++) {
            const angle = 0.1 * i;
            const x = centerX + (0.5 * angle) * Math.cos(angle);
            const y = centerY + (0.5 * angle) * Math.sin(angle);
            ctx.lineTo(x, y);
        }
        ctx.stroke();
    }
    function nextStage() {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        stg++; if(stg >= STAGES.length) endGame(true); else loadStage();
    }
    function shareX(clearTime) {
        const title = "GIGA-HARD Challenge RTA";
        const rank = clearTime < 45 ? "神速 (GOD)" : clearTime < 60 ? "超人 (SUPER)" : "凡人 (HUMAN)";
        const text = `${title}\nCleared in ${clearTime}s!\nRank: ${rank}\nCan you beat me?\n#GigaHardRTA #10万円チャレンジ\n`;
        const url = window.location.href;
        window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
    }
    function endGame(win) {
        live=false;
        const finalSec = (totalTime/100).toFixed(2);
        if(win) saveScore(document.getElementById('name').value || "PLAYER", totalTime);
        const o=document.createElement('div'); o.className="fixed inset-0 bg-black/95 z-[60000] flex flex-col items-center justify-center p-8 text-center";
        o.innerHTML=win?`
            <h1 class='text-4xl text-yellow-400 font-black mb-4 uppercase'>${L.clear}</h1>
            <p class='text-2xl'>${finalSec}s</p>
            <button onclick='shareX(${finalSec})' class='share-btn'>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                ${L.share}
            </button>
            <button onclick='location.reload()' class='mt-10 bg-white text-black px-12 py-4 rounded-full font-black uppercase'>TITLE</button>
        `:`<h1 class='text-7xl text-red-600 font-black mb-8 italic uppercase'>TIME UP</h1><button onclick='location.reload()' class='bg-red-600 text-white px-16 py-5 rounded-full font-black uppercase'>RETRY</button>`;
        document.body.append(o);
    }
</script>
</body>
</html>
