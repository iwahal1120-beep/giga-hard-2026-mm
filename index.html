<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIGA-HARD Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; user-select: none; margin: 0; }
        /* 背景色を少し暗くし、絵文字サイズを指示通り40%縮小 (1.5rem) */
        #game-area { 
            height: calc(100vh - 120px); 
            position: relative; 
            background: #d1d5db; 
            overflow: hidden; 
        }
        .emoji { 
            position: absolute; 
            cursor: pointer; 
            font-size: 1.5rem; /* サイズ縮小 */
            width: 40px; 
            height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .target { z-index: 10000; } 
        .noise { z-index: 100; }
        
        /* 🪙 をイエローにする設定 */
        .yellow-coin { color: #facc15; filter: drop-shadow(0 0 1px #854d0e); }
        
        .danger-pulse #game-area { animation: pulse 0.4s infinite alternate; }
        @keyframes pulse { from { background: #d1d5db; } to { background: #f87171; } }
        
        #start-screen { background: rgba(0,0,0,0.95); }
    </style>
</head>
<body>

<div id="start-screen" class="fixed inset-0 z-[50000] p-6 flex flex-col items-center overflow-y-auto">
    <div class="max-w-md w-full">
        <h1 class="text-4xl font-black text-yellow-400 text-center mb-8 italic tracking-tighter">GIGA-HARD</h1>
        
        <div class="bg-zinc-900 p-5 rounded-2xl text-[10px] space-y-3 mb-8 border border-zinc-700 text-zinc-300 leading-relaxed">
            <p class="text-white font-bold">【規約 / Terms】</p>
            <p>収益の一部はユニセフ等へ寄付。2026年12月31日 0:00時点の成績で賞品確定。AI不正監視中。本人確認にOFUSEパスワード必須。</p>
            <p>Part of proceeds donated. Deadline: Dec 31, 2026. Prize: JCB Gift Card. AI anti-cheat active. OFUSE PW required.</p>
            <a href="https://ofuse.me/d33e72b9" target="_blank" class="block bg-orange-600 text-white text-center py-3 rounded-lg font-bold text-xs mt-2 active:bg-orange-500">OFUSE PASSを取得する</a>
        </div>

        <input type="text" id="name" placeholder="Name / 名前" class="w-full p-4 rounded-xl bg-zinc-800 mb-3 text-white border border-zinc-600 outline-none focus:border-yellow-400">
        <input type="text" id="pw" placeholder="OFUSE Password / パスワード" class="w-full p-4 rounded-xl bg-zinc-800 mb-6 text-white border border-zinc-600 outline-none focus:border-yellow-400">
        <button onclick="start()" class="w-full bg-red-700 py-5 rounded-2xl font-black text-2xl shadow-xl active:scale-95 transition-all">CHALLENGE START</button>
    </div>
</div>

<header class="h-[120px] bg-black flex flex-col justify-center px-6 border-b border-zinc-800 relative z-20">
    <div class="flex justify-between text-xs mb-1 font-black italic">
        <span id="stg" class="text-red-600">STAGE 1 / 25</span>
        <span class="text-zinc-500">SEARCH TARGET</span>
    </div>
    <div id="timer" class="text-6xl font-mono font-black text-center text-white tabular-nums">30.00</div>
</header>

<main id="game-area"></main>

<script>
    const STAGES = [
        {t:["🙋‍♂️"], n:["🐶","🐱","🐭"], c:600},
        {t:["🐱"], n:["🧔","👵","👦"], c:600},
        {t:["🚲"], n:["🚗","🚌","🚙"], c:500},
        {t:["🍪"], n:["🍬","🍭","🍩"], c:600},
        {t:["🥈","🥈","🥈","🥈","🥈"], n:["🪙"], c:700, s:"s"},
        {t:["🤡"], n:["💃","👱‍♀️"], c:600, s:"cl"},
        {t:["🇯🇵","🇺🇸","🇫🇷","🇮🇹","🇰🇷"], n:["🌍","🌎"], c:600},
        {t:["🦴"], n:["🐟","🐠"], c:650},
        {t:["🔴"], n:["🪐","⭐","🌌"], c:700},
        {t:["あ","あ","あ","あ","あ"], n:["あ"], c:450, s:"mi"},
        {t:["⛩"], n:["🏢","🏣"], c:650},
        {t:["🍒"], n:["🍎"], c:700},
        {t:["🐛"], n:["🍃","🌱"], c:650},
        {t:["🏆"], n:["⚽","🏀"], c:650},
        {t:["🍌"], n:["🌙"], c:700},
        {t:["🐼","🦁","🐯","🐨","🐒"], n:["🐭"], c:550},
        {t:["🐙"], n:["🦑"], c:700},
        {t:["🛸"], n:["✨","🌟"], c:800, s:"uf"},
        {t:["🍦","🍦","🍦","🍦","🍦"], n:["🍭"], c:600},
        {t:["👁️","👁️","👁️","👁️","👁️"], n:["👁️"], c:600, s:"ey"},
        {t:["💃","💃","💃","💃","💃"], n:["🧔"], c:700},
        {t:["■","■","■","■","■"], n:["■"], c:500, s:"sh"},
        {t:["🐥","🐥","🐥","🐥","🐥"], n:["🐓"], c:550},
        {t:["WIN"], n:[], c:0, s:"ch"},
        {t:["G","G","G","G","G"], n:[], c:0, s:"sp"}
    ];

    let stg=0, time=3000, tid=null, found=0, score=0, pName, pPass, live=false;
    const area=document.getElementById('game-area'), timerEl=document.getElementById('timer');
    const audio = new (window.AudioContext || window.webkitAudioContext)();

    function beep(f,t,d) {
        if(audio.state === 'suspended') audio.resume();
        const o=audio.createOscillator(), g=audio.createGain();
        o.type=t; o.frequency.value=f; g.gain.value=0.05;
        o.connect(g); g.connect(audio.destination);
        o.start(); o.stop(audio.currentTime+d);
    }

    function start() {
        pName=document.getElementById('name').value; pPass=document.getElementById('pw').value;
        if(!pName || !pPass) return alert("Please enter Name and Password.");
        document.getElementById('start-screen').style.display='none';
        stg=0; score=0; live=true;
        loadStage(); 
        if(!tid) tid=setInterval(tick, 10);
    }

    function tick() {
        if(!live) return;
        time--;
        timerEl.innerText = (time/100).toFixed(2);
        
        if(time <= 1000) {
            document.body.classList.add('danger-pulse');
            timerEl.style.color='#ff4444';
            if(time % 50 === 0) beep(60, 'sine', 0.1);
        } else {
            document.body.classList.remove('danger-pulse');
            timerEl.style.color='#fff';
        }
        
        if(time <= 0) {
            timerEl.innerText = "0.00";
            endGame(false);
        }
    }

    function loadStage() {
        area.innerHTML=""; 
        found=0; 
        time = 3000; // ★ここで各ステージ開始時に30秒(3000ms)にリセット
        
        const s = STAGES[stg];
        document.getElementById('stg').innerText=`STAGE ${stg+1} / 25`;
        
        if(s.s==='ch') {
            const wrap = document.createElement('div');
            wrap.className = "flex h-full w-full items-center justify-around";
            const b1=document.createElement('button'); b1.className="w-28 h-28 bg-red-600 rounded-full font-black shadow-2xl active:scale-90 transition-transform"; b1.innerText="RED";
            const b2=document.createElement('button'); b2.className="w-28 h-28 bg-blue-600 rounded-full font-black shadow-2xl active:scale-90 transition-transform"; b2.innerText="BLUE";
            const ok=Math.random()>0.5?b1:b2;
            b1.onclick=()=>b1===ok?nextStage():endGame(false); b2.onclick=()=>b2===ok?nextStage():endGame(false);
            wrap.append(b1,b2); area.append(wrap);
        } else if(s.s==='sp') {
            for(let i=0; i<5; i++){
                const h=document.createElement('div'); h.className="emoji target"; h.style.left=Math.random()*85+5+"%"; h.style.top=Math.random()*85+5+"%";
                h.style.width="45px"; h.style.height="45px"; h.style.border="2px dashed #666"; h.style.borderRadius="50%";
                h.onclick=()=>{ h.style.background="rgba(34,197,94,0.6)"; h.onclick=null; found++; if(found>=5) nextStage(); }; area.append(h);
            }
        } else {
            // ノイズ生成
            for(let i=0;i<s.c;i++) {
                const n=document.createElement('div'); n.className="emoji noise"; n.innerText=s.n[i%s.n.length];
                n.style.left=Math.random()*92+"%"; n.style.top=Math.random()*92+"%";
                if(s.s==='s') n.classList.add('yellow-coin'); // コインをイエローに
                n.onclick=()=>{ time=Math.max(0,time-300); beep(100,'sawtooth',0.1); }; 
                area.append(n);
            }
            // ターゲット生成
            s.t.forEach(t=>{
                const g=document.createElement('div'); g.className="emoji target"; g.innerText=t;
                g.style.left=Math.random()*88+2+"%"; g.style.top=Math.random()*88+2+"%";
                if(s.s==='mi') g.style.transform="scaleX(-1)";
                if(s.s==='uf') g.style.opacity="0.1";
                g.onclick=(e)=>{ 
                    e.stopPropagation(); 
                    g.style.visibility='hidden'; 
                    found++; 
                    beep(880,'sine',0.1); 
                    if(found>=s.t.length) nextStage(); 
                };
                area.append(g);
            });
        }
    }

    function nextStage() {
        score += time; 
        confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } });
        stg++;
        if(stg >= STAGES.length) endGame(true); else loadStage();
    }

    function endGame(win) {
        live=false;
        const o=document.createElement('div'); o.className="fixed inset-0 bg-black/95 z-[60000] flex flex-col items-center justify-center p-8 text-center";
        o.innerHTML=win?`
            <h1 class="text-6xl text-yellow-400 font-black mb-4">COMPLETE!</h1>
            <p class="text-2xl mb-6">Score: ${score}</p>
            <div class="bg-zinc-800 p-6 rounded-2xl text-left w-72 border border-zinc-600 shadow-2xl">
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Player</p>
                <p class="text-lg font-bold mb-3">${pName}</p>
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Password</p>
                <p class="text-lg font-bold">${pPass}</p>
            </div>
            <p class="text-sm text-red-500 mt-8 font-black animate-pulse">Screenshot this for prize verification</p>
            <button onclick="location.reload()" class="mt-10 bg-white text-black px-16 py-4 rounded-full font-black text-xl active:scale-95">TITLE</button>
        `:`
            <h1 class="text-7xl text-red-600 font-black mb-8 italic tracking-tighter">TIME UP</h1>
            <button onclick="location.reload()" class="bg-red-600 text-white px-16 py-5 rounded-full font-black text-2xl shadow-lg active:scale-95">RETRY</button>
        `;
        document.body.append(o);
    }
</script>
</body>
</html>
