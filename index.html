<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【未踏の絶望】GIGA-HARD Challenge RTA</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; user-select: none; margin: 0; touch-action: manipulation; }
        .system-ticker { background: #450a0a; color: #ff0000; font-family: monospace; font-size: 10px; padding: 4px 0; border-bottom: 1px solid #ff0000; overflow: hidden; white-space: nowrap; }
        .ticker-content { display: inline-block; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        #game-area { height: calc(100vh - 145px); position: relative; background: #d1d5db; overflow: hidden; }
        
        /* Danger Mode (残り10秒) の点滅演出 */
        .danger-mode #game-area { animation: menace-pink 0.15s infinite alternate !important; }
        @keyframes menace-pink { 0% { background: #d1d5db; } 100% { background: #ffb6c1; } }
        
        .emoji { position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .target { z-index: 10000; font-size: 1.5rem; } 
        .noise { z-index: 100; font-size: 1.2rem; }

        /* --- 修正ギミック CSS --- */
        .faint-target { opacity: 0.08 !important; } 
        .mini-target { transform: scale(0.4) !important; } 
        .big-clown-target { transform: scale(3.5) !important; } 
        
        /* 【重要】四角の同化と「白」での浮き上がり */
        .hidden-square { 
            color: #d1d5db !important; 
            -webkit-text-fill-color: #d1d5db !important; 
            transition: color 0.1s, text-shadow 0.1s;
        }
        /* Danger Mode 時のみ「白」で浮かび上がる */
        .danger-mode .hidden-square { 
            color: #ffffff !important; 
            -webkit-text-fill-color: #ffffff !important;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        .black-text { color: #000 !important; -webkit-text-fill-color: #000 !important; }
        .shaking-noise { animation: vibration 0.05s infinite; color: #4b5563; }
        @keyframes vibration { 0% { transform: translate(0,0); } 100% { transform: translate(2px, 1px); } }
        
        #spiral-canvas { position: absolute; inset: 0; z-index: 50; pointer-events: none; display: none; }
        .cut-point { position: absolute; width: 28px; height: 28px; z-index: 20000; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .gap-pixel { width: 3px; height: 3px; background: #d1d5db; border-radius: 50%; }
        
        .ranking-box { background: rgba(20, 20, 20, 0.9); border: 1px solid #444; width: 100%; border-radius: 12px; padding: 10px; margin-top: 10px; }
        .ranking-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 4px; font-size: 10px; font-family: monospace; }
        .btn-share { background: #1DA1F2; color: white; padding: 12px 20px; border-radius: 99px; font-weight: bold; display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body id="main-body">

<div class="system-ticker">
    <div class="ticker-content">● SYSTEM WARNING: STAGES INCREASING... CURRENT: 25+??? | SURVIVAL RATE: 0.01% | 100,000 YEN POOL ACTIVE</div>
</div>

<div id="start-screen" class="fixed inset-0 z-[50000] p-6 flex flex-col items-center overflow-y-auto bg-black">
    <div class="max-w-md w-full flex flex-col items-center">
        <div class="w-full bg-zinc-900 rounded-2xl border-2 border-orange-500 overflow-hidden mb-6">
            <div class="bg-orange-600 p-3 text-center text-white font-black"><a href="https://ofuse.me/d33e72b9" target="_blank" class="hover:underline">OFUSE / パスワード取得</a></div>
            <div class="p-6 text-center bg-gradient-to-b from-zinc-800 to-zinc-900">
                <h2 class="text-4xl font-black text-yellow-400 mb-2 italic">10万円にチャレンジ！</h2>
                <p class="text-red-500 font-bold">終了 2027.1.1 0:00am</p>
            </div>
        </div>
        <input type="text" id="name" placeholder="Nickname" class="w-full p-4 rounded-xl bg-zinc-800 mb-2 border border-zinc-600 text-white text-center">
        <input type="password" id="pw" maxlength="4" placeholder="4-digit PW" class="w-full p-4 rounded-xl bg-zinc-800 mb-6 border border-zinc-600 text-white text-center">
        <button onclick="start()" id="start-btn" class="w-full bg-red-700 py-5 rounded-2xl font-black text-2xl italic border-b-4 border-red-900 uppercase">UNKNOWN RTA START</button>
        <div class="ranking-box" id="ranking-list"></div>
    </div>
</div>

<header class="h-[120px] bg-black flex flex-col justify-center px-6 border-b border-zinc-800">
    <div class="flex justify-between text-[11px] font-bold text-zinc-400 mb-1 italic">
        <span id="stg">STAGE 0/25+?</span>
        <span id="target-text">INITIALIZING...</span>
    </div>
    <div id="timer" class="text-6xl font-mono font-black tabular-nums text-white text-center">30.00</div>
</header>

<main id="game-area"><canvas id="spiral-canvas"></canvas></main>

<script>
    const STAGES = [
        {m:"人間を探せ", t:["🙋‍♂️"], n:["🐶","🐱","🐭"], c:500},
        {m:"猫を探せ", t:["🐱"], n:["🧔","👵","👦"], c:500},
        {m:"自転車を探せ", t:["🚲"], n:["🚗","🚌","🚙"], c:500},
        {m:"クッキーを探せ", t:["🍪"], n:["🍬","🍭","🍩"], c:500},
        {m:"銀貨5個探せ", t:["🥈","🥈","🥈","🥈","🥈"], n:["●"], c:500, s:"s"},
        {m:"ピエロを探せ", t:["🤡"], n:["💃","👱‍♀️"], c:500, s:"clown"},
        {m:"国旗10個探せ", t:["🇯🇵","🇺🇸","🇫🇷","🇮🇹","🇨🇳","🇷🇺","🇬🇧","🇩🇪","🇰🇷","🇪🇸"], n:["🌍","🌎"], c:600},
        {m:"骨を探せ", t:["🦴"], n:["🐟","🐠"], c:600},
        {m:"ピンクの花を探せ", t:["🌸"], n:["⭐"], c:600, s:"faint"},
        {m:"逆あを5個探せ", t:["あ","あ","あ","あ","あ"], n:["あ"], c:450, s:"mi"},
        {m:"鳥居を探せ", t:["⛩"], n:["🏢","🏣"], c:600},
        {m:"チェリーを探せ", t:["🍒"], n:["🍎"], c:600},
        {m:"虫を探せ", t:["🐛"], n:["🍃","🌱"], c:600, s:"mini"},
        {m:"カップを探せ", t:["🏆"], n:["⚽","🏀"], c:600},
        {m:"バナナを探せ", t:["🍌"], n:["🌙"], c:600},
        {m:"パンダを探せ", t:["🐼"], n:["🐨","🦁","🐯"], c:600, s:"mini"},
        {m:"タコを探せ", t:["🐙"], n:["🦑"], c:650},
        {m:"UFOを探せ", t:["🛸"], n:["✨","🌟"], c:700, s:"faint"},
        {m:"ソフトクリーム5個", t:["🍦","🍦","🍦","🍦","🍦"], n:["🍭"], c:600},
        {m:"バグを探せ", t:["👾"], n:["📱","💻","💾"], c:650},
        {m:"女性5人探せ", t:["💃","💃","💃","💃","💃"], n:["🧔"], c:600, s:"faint"},
        {m:"止まっている四角5個", t:["■","■","■","■","■"], n:["■"], c:500, s:"sq"}, 
        {m:"ひよこ5匹探せ", t:["🐥","🐥","🐥","🐥","🐥"], n:["🐓"], c:550},
        {m:"運命の二択", s:"ch"},
        {m:"螺旋の断線8個", s:"sp"}
    ];

    let stg=0, time=3000, tid=null, found=0, totalTime=0, live=false;
    const area=document.getElementById('game-area'), canvas=document.getElementById('spiral-canvas'), ctx=canvas.getContext('2d'), 
          timerEl=document.getElementById('timer'), stgEl=document.getElementById('stg'), txtEl=document.getElementById('target-text'), 
          bodyEl=document.getElementById('main-body');

    window.onload = () => { updateRanking(); };

    function updateRanking() {
        let ranks = JSON.parse(localStorage.getItem('giga-hard-v6')) || [];
        const listEl = document.getElementById('ranking-list');
        listEl.innerHTML = '<p class="text-[9px] text-zinc-500 mb-1 border-b border-zinc-800 pb-1 text-center font-mono uppercase">Live Ranking</p>';
        ranks.sort((a,b) => a.score - b.score).slice(0, 10).forEach((r, i) => {
            const item = document.createElement('div'); item.className = "ranking-item";
            item.innerHTML = `<span><span class="text-red-600 font-bold mr-2">${i+1}</span>${r.name}</span><span class="text-yellow-500">${(r.score/100).toFixed(2)}s</span>`;
            listEl.append(item);
        });
    }

    function saveScore(name, score) {
        let ranks = JSON.parse(localStorage.getItem('giga-hard-v6')) || [];
        ranks.push({name: name, score: score});
        localStorage.setItem('giga-hard-v6', JSON.stringify(ranks.sort((a,b) => a.score - b.score).slice(0, 10)));
        updateRanking();
    }

    function start() {
        if(!document.getElementById('name').value) return alert("Nickname required");
        document.getElementById('start-screen').style.display='none';
        stg=0; totalTime=0; live=true; loadStage();
        if(!tid) tid=setInterval(tick, 10);
    }

    function tick() {
        if(!live) return;
        time--; totalTime++;
        timerEl.innerText = (time/100).toFixed(2);
        if(time <= 1000) bodyEl.classList.add('danger-mode');
        if(time <= 0) endGame(false);
    }

    function loadStage() {
        area.querySelectorAll('.emoji, .cut-point, .ch-wrap').forEach(el => el.remove());
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.style.display = "none";
        found=0; time=3000;
        bodyEl.classList.remove('danger-mode');
        const s = STAGES[stg];
        stgEl.innerText = `STAGE ${stg+1}/${STAGES.length}+?`;
        txtEl.innerText = s.m;
        
        if(s.s==='ch') {
            const wrap = document.createElement('div'); wrap.className = "ch-wrap flex h-full w-full items-center justify-around";
            ["RED","BLUE"].forEach(c => {
                const b=document.createElement('button'); b.className=`w-32 h-32 bg-${c.toLowerCase()}-600 rounded-full font-black text-white text-xl`; b.innerText=c;
                b.onclick=()=>{ Math.random()>0.5 ? nextStage() : endGame(false); }; wrap.append(b);
            });
            area.append(wrap);
        } else if(s.s==='sp') {
            canvas.style.display = "block"; canvas.width = area.clientWidth; canvas.height = area.clientHeight;
            drawSpiral(70);
            for(let i=0; i<8; i++) {
                const cut = document.createElement('div'); cut.className = "cut-point";
                const dot = document.createElement('div'); dot.className = "gap-pixel";
                cut.append(dot); cut.style.left = Math.random()*80+10+"%"; cut.style.top = Math.random()*80+10+"%";
                cut.onclick = () => { dot.style.background = "#22c55e"; dot.style.width = "10px"; found++; if(found >= 8) nextStage(); };
                area.append(cut);
            }
        } else {
            for(let i=0; i<s.c; i++) {
                const n=document.createElement('div'); n.className="emoji noise";
                n.innerText=s.n[i%s.n.length]; n.style.left=Math.random()*94+"%"; n.style.top=Math.random()*94+"%";
                if(s.s==='mi') n.classList.add('black-text');
                n.onclick=()=>{ time=Math.max(0,time-300); }; area.append(n);
            }
            s.t.forEach(emoji => {
                const g=document.createElement('div'); g.className="emoji target"; g.innerText=emoji;
                g.style.left=Math.random()*90+2+"%"; g.style.top=Math.random()*90+2+"%";
                if(s.s==='clown') g.classList.add('big-clown-target');
                if(s.s==='faint') g.classList.add('faint-target');
                if(s.s==='mini') g.classList.add('mini-target');
                if(s.s==='sq') g.classList.add('hidden-square');
                if(s.s==='mi') { g.classList.add('black-text'); g.style.transform="scaleX(-1)"; }
                g.onclick=(e)=>{ e.stopPropagation(); g.style.visibility='hidden'; found++; if(found >= s.t.length) nextStage(); };
                area.append(g);
            });
        }
    }
    function drawSpiral(turns) {
        ctx.beginPath(); ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
        const centerX = canvas.width / 2, centerY = canvas.height / 2;
        for (let i = 0; i < turns * 360; i++) {
            const angle = 0.1 * i;
            const x = centerX + (0.5 * angle) * Math.cos(angle);
            const y = centerY + (0.5 * angle) * Math.sin(angle);
            ctx.lineTo(x, y);
        }
        ctx.stroke();
    }
    function nextStage() { confetti({ particleCount: 50 }); stg++; if(stg >= STAGES.length) endGame(true); else loadStage(); }
    function share(msg) { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(msg)}&url=${encodeURIComponent(window.location.href)}`, '_blank'); }
    function endGame(win) {
        live=false; const fs = (totalTime/100).toFixed(2);
        if(win) saveScore(document.getElementById('name').value, totalTime);
        const o=document.createElement('div'); o.className="fixed inset-0 bg-black/98 z-[60000] flex flex-col items-center justify-center p-8 text-center";
        o.innerHTML = win ? `<h1 class='text-yellow-400 text-4xl font-black'>MISSION CLEAR</h1><p>${fs}s</p><button onclick='share("【増殖する絶望】クリア！タイム:${fs}秒\\n#GigaHardRTA")' class='btn-share'>結果をシェア</button>` : `<h1 class='text-red-600 text-6xl font-black'>FAILED</h1><button onclick='location.reload()' class='btn-share bg-red-600 mt-4'>RETRY CHALLENGE</button>`;
        document.body.append(o);
    }
</script>
</body>
</html>
