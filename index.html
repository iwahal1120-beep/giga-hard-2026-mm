<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIGA-HARD Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; user-select: none; margin: 0; }
        #game-area { height: calc(100vh - 120px); position: relative; background: #d1d5db; overflow: hidden; }
        
        /* 絵文字とターゲットの基本サイズ（40%縮小の1.5rem） */
        .emoji { 
            position: absolute; cursor: pointer; font-size: 1.5rem; 
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; 
        }
        .target { z-index: 10000; } 
        .noise { z-index: 100; }
        .yellow-coin { color: #facc15; }

        /* 22ステージ用：動く四角（ノイズ） */
        @keyframes moveAround {
            0% { transform: translate(0, 0); }
            100% { transform: translate(calc(Math.random() * 20px), calc(Math.random() * 20px)); }
        }
        .moving-square { animation: moveAround 0.2s infinite alternate ease-in-out; color: #4b5563; }

        .danger-pulse #game-area { animation: pulse 0.4s infinite alternate; }
        @keyframes pulse { from { background: #d1d5db; } to { background: #f87171; } }
    </style>
</head>
<body>

<div id="start-screen" class="fixed inset-0 z-[50000] p-6 flex flex-col items-center overflow-y-auto bg-black/95">
    <div class="max-w-md w-full">
        <h1 class="text-4xl font-black text-yellow-400 text-center mb-8 italic">GIGA-HARD</h1>
        <div class="bg-zinc-900 p-5 rounded-2xl text-[10px] space-y-3 mb-8 border border-zinc-700 text-zinc-300">
            <p>【規約】収益の一部は寄付。2026年12月31日 0:00時点の成績で賞品確定。本人確認にOFUSEパスワード必須。</p>
            <p>【Terms】Deadline: Dec 31, 2026. Prize: JCB Gift Card. OFUSE PW required.</p>
        </div>
        <input type="text" id="name" placeholder="Name / 名前" class="w-full p-4 rounded-xl bg-zinc-800 mb-3 text-white border border-zinc-600">
        <input type="text" id="pw" placeholder="OFUSE Password / パスワード" class="w-full p-4 rounded-xl bg-zinc-800 mb-6 text-white border border-zinc-600">
        <button onclick="start()" class="w-full bg-red-700 py-5 rounded-2xl font-black text-2xl shadow-xl active:scale-95">START</button>
    </div>
</div>

<header class="h-[120px] bg-black flex flex-col justify-center px-6 border-b border-zinc-800">
    <div class="flex justify-between text-xs mb-1 font-bold italic">
        <span id="stg" class="text-red-600">STAGE</span>
        <span id="target-text" class="text-zinc-400">LOADING...</span>
    </div>
    <div id="timer" class="text-6xl font-mono font-black text-center text-white">30.00</div>
</header>

<main id="game-area"></main>

<script>
    const STAGES = [
        {m:"人間を探せ (Find Human)", t:["🙋‍♂️"], n:["🐶","🐱","🐭"], c:600},
        {m:"猫を探せ (Find Cat)", t:["🐱"], n:["🧔","👵","👦"], c:600},
        {m:"自転車を探せ (Find Bicycle)", t:["🚲"], n:["🚗","🚌","🚙"], c:500},
        {m:"クッキーを探せ (Find Cookie)", t:["🍪"], n:["🍬","🍭","🍩"], c:600},
        {m:"銀貨を探せ (Find Silver Coin)", t:["🥈"], n:["🪙"], c:700, s:"s"},
        {m:"ピエロを探せ (Find Clown)", t:["🤡"], n:["💃","👱‍♀️"], c:600},
        {m:"国旗を探せ (Find Flag)", t:["🇯🇵","🇺🇸","🇫🇷","🇮🇹","🇰🇷"], n:["🌍","🌎"], c:600},
        {m:"骨を探せ (Find Bone)", t:["🦴"], n:["🐟","🐠"], c:650},
        {m:"ピンクの星を探せ (Find Pink Star)", t:["🌸"], n:["⭐","🪐","🌌"], c:700},
        {m:"逆あを5個探せ (Find 5 Reversed あ)", t:["あ","あ","あ","あ","あ"], n:["あ"], c:450, s:"mi"},
        {m:"鳥居を探せ (Find Torii)", t:["⛩"], n:["🏢","🏣"], c:650},
        {m:"チェリーを探せ (Find Cherry)", t:["🍒"], n:["🍎"], c:700},
        {m:"虫を探せ (Find Bug)", t:["🐛"], n:["🍃","🌱"], c:650},
        {m:"カップを探せ (Find Cup)", t:["🏆"], n:["⚽","🏀"], c:650},
        {m:"バナナを探せ (Find Banana)", t:["🍌"], n:["🌙"], c:700},
        {m:"パンダを探せ (Find Panda)", t:["🐼"], n:["🐨","🦁","🐯"], c:600},
        {m:"タコを探せ (Find Octopus)", t:["🐙"], n:["🦑"], c:700},
        {m:"UFOを探せ (Find UFO)", t:["🛸"], n:["✨","🌟"], c:800, s:"uf"},
        {m:"ソフトクリームを5個 (5 Soft Creams)", t:["🍦","🍦","🍦","🍦","🍦"], n:["🍭"], c:600},
        {m:"バグを探せ (Find Bug)", t:["👾"], n:["📱","💻","💾"], c:750},
        {m:"女性5人探せ (Find 5 Women)", t:["💃","💃","💃","💃","💃"], n:["🧔"], c:700},
        {m:"止まっている四角5個探せ (Find 5 Static Squares)", t:["■","■","■","■","■"], n:["■"], c:500, s:"sq"},
        {m:"ひよこ5匹探せ (Find 5 Chicks)", t:["🐥","🐥","🐥","🐥","🐥"], n:["🐓"], c:550},
        {m:"運命の二択 (Choose One)", t:["WIN"], n:[], c:0, s:"ch"},
        {m:"切れているところ5個探せ (Find 5 Gaps)", t:["GAP"], n:[], c:0, s:"sp"}
    ];

    let stg=0, time=3000, tid=null, found=0, score=0, pName, pPass, live=false;
    const area=document.getElementById('game-area'), timerEl=document.getElementById('timer'), stgEl=document.getElementById('stg'), txtEl=document.getElementById('target-text');
    const audio = new (window.AudioContext || window.webkitAudioContext)();

    function beep(f,t,d) {
        if(audio.state === 'suspended') audio.resume();
        const o=audio.createOscillator(), g=audio.createGain();
        o.type=t; o.frequency.value=f; g.gain.value=0.05;
        o.connect(g); g.connect(audio.destination);
        o.start(); o.stop(audio.currentTime+d);
    }

    function start() {
        pName=document.getElementById('name').value; pPass=document.getElementById('pw').value;
        if(!pName || !pPass) return alert("Required / 入力必須");
        document.getElementById('start-screen').style.display='none';
        stg=0; score=0; live=true;
        loadStage(); 
        if(!tid) tid=setInterval(tick, 10);
    }

    function tick() {
        if(!live) return;
        time--;
        timerEl.innerText = (time/100).toFixed(2);
        if(time <= 1000) {
            document.body.classList.add('danger-pulse');
            timerEl.style.color='#ff4444';
            if(time % 50 === 0) beep(60, 'sine', 0.1);
        } else {
            document.body.classList.remove('danger-pulse');
            timerEl.style.color='#fff';
        }
        if(time <= 0) endGame(false);
    }

    function loadStage() {
        area.innerHTML=""; found=0; time = 3000;
        const s = STAGES[stg];
        stgEl.innerText=`STAGE ${stg+1} / 25`;
        txtEl.innerText = s.m;
        
        if(s.s==='ch') {
            const wrap = document.createElement('div'); wrap.className = "flex h-full w-full items-center justify-around";
            const b1=document.createElement('button'); b1.className="w-24 h-24 bg-red-600 rounded-full font-black"; b1.innerText="RED";
            const b2=document.createElement('button'); b2.className="w-24 h-24 bg-blue-600 rounded-full font-black"; b2.innerText="BLUE";
            const ok=Math.random()>0.5?b1:b2;
            b1.onclick=()=>b1===ok?nextStage():endGame(false); b2.onclick=()=>b2===ok?nextStage():endGame(false);
            wrap.append(b1,b2); area.append(wrap);
        } else if(s.s==='sp') {
            for(let i=0; i<5; i++){
                const h=document.createElement('div'); h.className="emoji target"; h.style.left=Math.random()*85+5+"%"; h.style.top=Math.random()*85+5+"%";
                h.style.width="35px"; h.style.height="35px"; h.style.border="3px dashed #ef4444"; h.style.borderRadius="50%";
                h.onclick=()=>{ h.style.background="rgba(34,197,94,0.6)"; h.onclick=null; found++; if(found>=5) nextStage(); }; area.append(h);
            }
        } else {
            for(let i=0;i<s.c;i++) {
                const n=document.createElement('div'); n.className="emoji noise"; n.innerText=s.n[i%s.n.length];
                n.style.left=Math.random()*92+"%"; n.style.top=Math.random()*92+"%";
                if(s.s==='s') n.classList.add('yellow-coin'); 
                if(s.s==='sq') { n.classList.add('moving-square'); n.style.fontSize="0.8rem"; }
                n.onclick=()=>{ time=Math.max(0,time-300); beep(100,'sawtooth',0.1); }; area.append(n);
            }
            s.t.forEach(t=>{
                const g=document.createElement('div'); g.className="emoji target"; g.innerText=t;
                g.style.left=Math.random()*88+2+"%"; g.style.top=Math.random()*88+2+"%";
                if(s.s==='mi') g.style.transform="scaleX(-1)";
                if(s.s==='uf') g.style.opacity="0.1";
                if(s.s==='sq') g.style.fontSize="0.8rem";
                g.onclick=(e)=>{ e.stopPropagation(); g.style.visibility='hidden'; found++; beep(880,'sine',0.1); if(found>=s.t.length) nextStage(); };
                area.append(g);
            });
        }
    }

    function nextStage() {
        score += time; confetti(); stg++;
        if(stg >= STAGES.length) endGame(true); else loadStage();
    }

    function endGame(win) {
        live=false;
        const o=document.createElement('div'); o.className="fixed inset-0 bg-black/95 z-[60000] flex flex-col items-center justify-center p-8 text-center";
        o.innerHTML=win?`
            <h1 class="text-5xl text-yellow-400 font-black mb-4 italic">COMPLETE</h1>
            <div class="bg-zinc-800 p-6 rounded-2xl text-left border border-zinc-600 shadow-2xl">
                <p class="text-[10px] text-zinc-500 font-bold">Total Score: ${score}</p>
                <p class="text-lg font-bold">Player: ${pName}</p>
                <p class="text-lg font-bold">Pass: ${pPass}</p>
            </div>
            <button onclick="location.reload()" class="mt-10 bg-white text-black px-16 py-4 rounded-full font-black">TITLE</button>
        `:`
            <h1 class="text-7xl text-red-600 font-black mb-8 italic">TIME UP</h1>
            <button onclick="location.reload()" class="bg-red-600 text-white px-16 py-5 rounded-full font-black active:scale-95">RETRY</button>
        `;
        document.body.append(o);
    }
</script>
</body>
</html>
