<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>GIGA-HARD 2026 - FINAL MONOLITH</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #ed6c00; --red: #d32f2f; }
        * { touch-action: manipulation; box-sizing: border-box; }
        body { margin: 0; background: #fff; color: #333; font-family: sans-serif; overflow: hidden; }
        #portal { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; overflow-y: auto; padding: 30px 20px; }
        .hero { font-size: 32px; font-weight: 900; color: var(--main); margin-bottom: 20px; text-align: center; }
        .card { width: 100%; max-width: 500px; background: #f9f9f9; border-left: 6px solid var(--main); padding: 20px; margin-bottom: 20px; border-radius: 4px; line-height: 1.6; }
        .btn-ofuse { display: block; width: 100%; max-width: 400px; background: var(--main); color: #fff; text-decoration: none; padding: 20px; border-radius: 12px; font-weight: bold; text-align: center; box-shadow: 0 4px 15px rgba(237,108,0,0.3); margin-bottom: 15px; font-size: 18px; }
        .btn-start { width: 100%; max-width: 400px; padding: 22px; background: #222; color: #fff; border: none; border-radius: 12px; font-size: 24px; font-weight: bold; cursor: pointer; }
        .hud { height: 65px; border-bottom: 2px solid #eee; display: flex; align-items: center; justify-content: space-around; background: #fff; font-weight: bold; }
        #timer { font-family: 'Courier New', monospace; font-size: 36px; color: var(--red); }
        .field { width: 100vw; height: calc(100vh - 65px); position: relative; overflow: hidden; }
        .target { position: absolute; font-size: 32px; cursor: pointer; z-index: 500; }
        .ghost { position: absolute; width: 12px; height: 12px; background: rgba(0,0,0,0.05); border-radius: 50%; cursor: pointer; z-index: 1000; }
        .dummy { position: absolute; font-size: 22px; pointer-events: none; opacity: 0.7; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 11000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="portal">
    <div class="hero">GIGA-HARD 2026</div>
    <div class="card">
        <strong>[ 規約 / Terms ]</strong>
        <p style="font-size:14px;">収益はUNICEF/国境なき医師団へ。2026年末まで進化し続けます。<br>
        <small>Revenue donated to UNICEF/MSF. Updates until 2026 end.</small></p>
    </div>
    <a href="https://ofuse.me/d33e72b9" target="_blank" class="btn-ofuse">OFUSEで参加・応援する / Join via OFUSE</a>
    <input type="text" id="p-name" placeholder="Name" style="padding:15px; width:100%; max-width:400px; border-radius:10px; border:2px solid #ddd; margin-bottom:15px; text-align:center; font-size:18px;">
    <button onclick="boot()" class="btn-start">GAME START</button>
</div>

<div id="overlay">
    <h1 style="color:var(--red); font-size:48px;">TIME UP</h1>
    <button onclick="location.reload()" style="padding:18px 60px; border-radius:40px; border:none; background:#222; color:#fff; font-size:22px; font-weight:bold; cursor:pointer;">RETRY</button>
</div>

<div class="hud">
    <div id="stg-info">STAGE 1 / 26</div>
    <div id="timer">30.00</div>
</div>
<div class="field" id="field"></div>

<script>
let cur = 1, ms = 3000, active = false, found = 0;

// 【全26ステージ物理実装：1行も省略なし】
const stages = [
    null,
    {n:1, g:"🐶", c:["🌳","🏠"], num:400},
    {n:2, g:"🌈", c:["☁️","☀️"], num:500},
    {n:3, g:"🍀", c:["🌿","🍃"], num:600},
    {n:4, g:"🍰", c:["🍬","🍩"], num:700},
    {n:5, type:"GHOST", goals:5},
    {n:6, g:"🦁", c:["🦒","🦓"], num:800},
    {n:7, g:"🐳", c:["🌊","⛵"], num:850},
    {n:8, g:"🦴", c:["🐟","🐠"], num:900},
    {n:9, g:"🔺", c:["🔻","🔶"], num:950, goals:3},
    {n:10, g:"あ", type:"mirror", num:800},
    {n:11, g:"⛩️", c:["🏢","🏨"], num:1000},
    {n:12, g:"🍒", c:["🍎","🍅"], num:900},
    {n:13, g:"🐛", c:["🍃","🌱"], num:900},
    {n:14, g:"🏆", c:["⚽","🏀"], num:900},
    {n:15, g:"🍌", c:["🌙","🌛"], num:950},
    {n:16, g:"🐼", c:["🐨","🐻"], num:1000, goals:3},
    {n:17, g:"🐙", c:["🦑","🦀"], num:1100},
    {n:18, g:"🛸", c:["✨","🌟"], num:1200, op:0.3},
    {n:19, g:"🍦", c:["🍭","🍩"], num:1000, goals:3},
    {n:20, g:"👀", c:["👁️"], num:1300, goals:3},
    {n:21, g:"💃", c:["🧔","👴"], num:1100, goals:3},
    {n:22, g:"■", c:["□"], num:1400, goals:5},
    {n:23, g:"🐥", c:["🥚","🐓"], num:1500, goals:3},
    {n:24, type:"FATE"},
    {n:25, type:"SPIRAL", goals:8},
    {n:26, g:"💖", c:["✨","🌸"], num:1800}
];

function boot() {
    if(!document.getElementById('p-name').value) return;
    document.getElementById('portal').style.display = 'none';
    run();
}

function run() {
    const f = document.getElementById('field'); f.innerHTML = ""; active = true; ms = 3000; found = 0;
    const s = stages[cur];
    document.getElementById('stg-info').innerText = `STAGE ${cur} / 26`;
    f.style.background = (s.type === "SPIRAL") ? "#000" : "#fff";

    if(s.type === "GHOST") {
        for(let i=0; i<s.goals; i++){
            const d=document.createElement('div'); d.className="ghost";
            d.style.left=(10+Math.random()*80)+"%"; d.style.top=(10+Math.random()*80)+"%";
            d.onclick=()=>{d.style.display="none"; found++; if(found>=s.goals) next();}; f.appendChild(d);
        }
    } else if(s.type === "FATE") {
        const r=document.createElement('div'); r.style="position:absolute;left:20%;top:40%;width:100px;height:100px;background:#f44336;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;"; r.innerText="RED";
        const b=document.createElement('div'); b.style="position:absolute;left:60%;top:40%;width:100px;height:100px;background:#2196f3;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;"; b.innerText="BLUE";
        let win = Math.random()>0.5?r:b;
        r.onclick=()=>r===win?next():location.reload(); b.onclick=()=>b===win?next():location.reload();
        f.appendChild(r); f.appendChild(b);
    } else if(s.type === "SPIRAL") {
        for(let i=0; i<s.goals; i++){
            const t=document.createElement('div'); t.style="position:absolute;width:15px;height:15px;background:#fff;border-radius:50%;cursor:pointer;box-shadow:0 0 10px #fff;";
            t.style.left=(10+Math.random()*80)+"%"; t.style.top=(10+Math.random()*80)+"%";
            t.onclick=()=>{t.style.display="none"; found++; if(found>=s.goals) next();}; f.appendChild(t);
        }
    } else {
        if(s.num) {
            for(let j=0; j<s.num; j++){
                const d=document.createElement('div'); d.className="dummy";
                d.style.left=Math.random()*98+"%"; d.style.top=Math.random()*98+"%";
                d.innerText=s.c[j%s.c.length]; f.appendChild(d);
            }
        }
        const gNum = s.goals || 1;
        for(let k=0; k<gNum; k++){
            const t=document.createElement('div'); t.className="target";
            t.style.left=(10+Math.random()*80)+"%"; t.style.top=(10+Math.random()*80)+"%";
            t.innerText=s.g;
            if(s.type==="mirror") t.style.transform="scaleX(-1)";
            if(s.op) t.style.opacity=s.op;
            t.onclick=()=>{t.style.display="none"; found++; if(found>=gNum) next();}; f.appendChild(t);
        }
    }
}

function next() {
    active = false; confetti({particleCount:150, spread:70, origin:{y:0.6}});
    cur++;
    setTimeout(() => { if(cur<=26) run(); else alert("YOU SAVED THE WORLD!"); }, 600);
}

setInterval(() => {
    if(!active) return;
    ms--;
    const t = document.getElementById('timer');
    if(ms <= 0) { active = false; document.getElementById('overlay').style.display = "flex"; return; }
    t.innerText = (ms/100).toFixed(2);
}, 10);
</script>
</body>
</html>
