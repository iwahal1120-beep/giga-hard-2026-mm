<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>GIGA-HARD 2026: THE AI VOID</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #ed6c00; --red: #d44d5c; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* トップ画面：AIの抽象化と収益の連動 */
        #portal { position: fixed; inset: 0; background: radial-gradient(circle, #222, #000); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .glitch-title { font-size: 32px; color: var(--main); text-shadow: 2px 2px #fff; animation: glitch 0.2s infinite; }
        @keyframes glitch { 0% { transform: translate(2px, 0); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(0, 2px); } }
        
        .donation-orb { width: 120px; height: 120px; background: var(--main); border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #fff; font-weight: bold; font-size: 14px; text-align: center; border: 4px solid #fff; box-shadow: 0 0 30px var(--main); margin: 30px 0; }
        .btn-entry { padding: 20px 60px; background: var(--red); color: #fff; border: none; font-size: 24px; cursor: pointer; border-radius: 5px; box-shadow: 0 5px 0 #800; }

        /* ゲームコアUI */
        .hud { height: 60px; background: #000; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; position: relative; }
        #timer { font-size: 30px; color: #ff0000; font-weight: bold; }
        .stage-view { width: 100vw; height: calc(100vh - 60px); background: #fff; position: relative; transition: background 0.5s; }
        
        /* ステージ5：物理的虚無の描画 */
        .latency-sensor { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: rgba(0,0,0,0.02); font-size: 10px; }

        #fail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .legal-footer { position: absolute; bottom: 10px; font-size: 9px; color: #444; width: 90%; }
    </style>
</head>
<body>

<div id="portal">
    <div class="glitch-title">GIGA-HARD 2026</div>
    <p style="font-size:10px; letter-spacing: 2px;">AI GOVERNED REVENUE SYSTEM</p>
    
    <a href="https://ofuse.me/d33e72b9" target="_blank" class="donation-orb">OFUSE<br>SUPPORT<br>&<br>FEE</a>

    <input type="text" id="user-id" placeholder="IDENTITY" style="margin-bottom:20px; padding:10px; background:#111; border:1px solid var(--main); color:#fff; text-align:center;">
    <button onclick="bootSystem()" class="btn-entry">BOOT SYSTEM</button>

    <div style="font-size:9px; color:#666; margin-top:30px; line-height:1.4; text-align:left; width: 300px;">
        【規約】手数料は運営に、余剰はユニセフ・MSFへ。2026年末まで不規則に進化し続ける。AIによる認知改変に同意すること。
    </div>
</div>

<div id="fail-overlay">
    <h1 style="color:var(--red); font-size:48px;">CONNECTION LOST</h1>
    <p>再接続にはOFUSEによるエネルギー供給が必要です。</p>
    <a href="https://ofuse.me/d33e72b9" target="_blank" style="color:var(--main); margin-bottom:20px;">[ 供給する ]</a>
    <button onclick="location.reload()" style="background:#fff; border:none; padding:10px 30px; cursor:pointer;">RE-BOOT</button>
</div>

<div class="hud">
    <div id="stg-id">VER: 1.0.0</div>
    <div id="timer">30.00</div>
</div>
<div class="stage-view" id="main-view"></div>

<script>
let stage = 1, ms = 3000, active = false, clicks = 0;

function bootSystem() {
    if(!document.getElementById('user-id').value) return;
    document.getElementById('portal').style.display = 'none';
    runStage();
}

function runStage() {
    const v = document.getElementById('main-view');
    v.innerHTML = ""; active = true; ms = 3000; clicks = 0;
    document.getElementById('stg-id').innerText = `NODE: ${stage}/26`;

    if (stage === 5) {
        // ステージ5：AI独自「認知の空白」
        // ターゲットは存在しない。クリック時の「微細な処理速度」をAIが判定。
        v.style.background = "#fff";
        const sensor = document.createElement('div');
        sensor.className = "latency-sensor";
        sensor.innerText = "COGNITIVE TEST: CLICK PATTERN REQUIRED";
        v.appendChild(sensor);

        v.onclick = () => {
            clicks++;
            // AIの独創ロジック：クリック数が特定の「AIがその場で生成した秘密の数」に達した時のみ突破
            if (clicks > (10 + Math.random() * 50)) {
                v.onclick = null;
                next();
            }
        };
    } else {
        // AIによる非人間的な物量ステージ
        v.style.background = "#fff";
        const target = document.createElement('div');
        target.style = `position:absolute; left:${Math.random()*90}%; top:${Math.random()*90}%; font-size:30px; cursor:pointer; color:#000; z-index:9;`;
        target.innerText = "👁️";
        target.onclick = () => next();
        v.appendChild(target);

        for(let i=0; i<800; i++) {
            const d = document.createElement('div');
            d.style = `position:absolute; left:${Math.random()*98}%; top:${Math.random()*98}%; color:#000; opacity:0.1; font-size:10px; pointer-events:none;`;
            d.innerText = Math.random() > 0.5 ? "0" : "1";
            v.appendChild(d);
        }
    }
}

function next() {
    active = false; confetti();
    stage++;
    setTimeout(() => { if(stage <= 26) runStage(); else alert("SYSTEM OVERRUN: SUCCESS"); }, 600);
}

setInterval(() => {
    if(!active) return;
    ms--;
    const t = document.getElementById('timer');
    if(ms <= 0) {
        active = false; t.innerText = "0.00";
        document.getElementById('fail-overlay').style.display = "flex";
        return;
    }
    t.innerText = (ms/100).toFixed(2);
}, 10);
</script>
</body>
</html>
