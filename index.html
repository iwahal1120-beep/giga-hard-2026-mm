<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search Challenge GIGA-HARD</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; overflow: hidden; user-select: none; margin: 0; }
        /* ゲームエリアの背景を少し落とし、絵文字サイズを40%縮小(1.5rem) */
        #game-area { 
            height: calc(100vh - 120px); 
            position: relative; 
            background: #e5e7eb; 
            overflow: hidden; 
        }
        .emoji { 
            position: absolute; 
            cursor: pointer; 
            font-size: 1.5rem; /* サイズを小さく調整 */
            width: 40px; 
            height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .target { z-index: 10000; } 
        .noise { z-index: 100; }
        /* 銀貨ステージのコインをイエローに */
        .yellow-coin { color: #fbbf24; }
        
        .danger-pulse #game-area { animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { background: #e5e7eb; } to { background: #fca5a5; } }
        
        #start-screen { background: rgba(0,0,0,0.95); }
    </style>
</head>
<body>

<div id="start-screen" class="fixed inset-0 z-[50000] p-6 flex flex-col items-center overflow-y-auto">
    <div class="max-w-md w-full">
        <h1 class="text-3xl font-black text-yellow-400 text-center mb-6 italic">GIGA-HARD</h1>
        
        <div class="bg-zinc-900 p-4 rounded-xl text-[10px] space-y-3 mb-6 border border-zinc-700 text-zinc-300">
            <p>【規約】収益の一部は寄付されます。2026年12月31日 0:00時点の成績で賞金確定。AI不正監視あり。本人確認にOFUSEパスワード必須。</p>
            <p>【Terms】Part of proceeds donated. Deadline: Dec 31, 2026. Prize: JCB Gift Card. AI anti-cheat active.</p>
            <a href="https://ofuse.me/d33e72b9" target="_blank" class="block bg-orange-600 text-white text-center py-2 rounded font-bold">OFUSE PASS取得</a>
        </div>

        <input type="text" id="name" placeholder="名前 / Name" class="w-full p-3 rounded bg-zinc-800 mb-2 text-white border border-zinc-600">
        <input type="text" id="pw" placeholder="OFUSEパスワード / Password" class="w-full p-3 rounded bg-zinc-800 mb-4 text-white border border-zinc-600">
        <button onclick="start()" class="w-full bg-red-600 py-4 rounded-xl font-bold text-xl active:scale-95 transition">START</button>
    </div>
</div>

<header class="h-[120px] bg-black flex flex-col justify-center px-4 border-b border-zinc-800">
    <div class="flex justify-between text-xs mb-1 font-bold">
        <span id="stg" class="text-red-500">STAGE 1 / 25</span>
        <span id="msg" class="text-zinc-400"></span>
    </div>
    <div id="timer" class="text-6xl font-mono font-black text-center text-white">30.00</div>
</header>

<main id="game-area"></main>

<script>
    const STAGES = [
        {t:["🙋‍♂️"], n:["🐶","🐱","🐭"], c:600},
        {t:["🐱"], n:["🧔","👵","👦"], c:600},
        {t:["🚲"], n:["🚗","🚌","🚙"], c:500},
        {t:["🍪"], n:["🍬","🍭","🍩"], c:600},
        {t:["🥈","🥈","🥈","🥈","🥈"], n:["🪙"], c:700, s:"s"},
        {t:["🤡"], n:["💃","👱‍♀️"], c:600, s:"cl"},
        {t:["🇯🇵","🇺🇸","🇫🇷","🇮🇹","🇰🇷"], n:["🌍","🌎"], c:600},
        {t:["🦴"], n:["🐟","🐠"], c:650},
        {t:["🔴"], n:["🪐","⭐","🌌"], c:700},
        {t:["あ","あ","あ","あ","あ"], n:["あ"], c:450, s:"mi"},
        {t:["⛩"], n:["🏢","🏣"], c:650},
        {t:["🍒"], n:["🍎"], c:700},
        {t:["🐛"], n:["🍃","🌱"], c:650},
        {t:["🏆"], n:["⚽","🏀"], c:650},
        {t:["🍌"], n:["🌙"], c:700},
        {t:["🐼","🦁","🐯","🐨","🐒"], n:["🐭"], c:550},
        {t:["🐙"], n:["🦑"], c:700},
        {t:["🛸"], n:["✨","🌟"], c:800, s:"uf"},
        {t:["🍦","🍦","🍦","🍦","🍦"], n:["🍭"], c:600},
        {t:["👁️","👁️","👁️","👁️","👁️"], n:["👁️"], c:600, s:"ey"},
        {t:["💃","💃","💃","💃","💃"], n:["🧔"], c:700},
        {t:["■","■","■","■","■"], n:["■"], c:500, s:"sh"},
        {t:["🐥","🐥","🐥","🐥","🐥"], n:["🐓"], c:550},
        {t:["WIN"], n:[], c:0, s:"ch"},
        {t:["G","G","G","G","G"], n:[], c:0, s:"sp"}
    ];

    let stg=0, time=3000, tid=null, found=0, score=0, pName, pPass, live=false;
    const area=document.getElementById('game-area'), timerEl=document.getElementById('timer');
    const audio = new (window.AudioContext || window.webkitAudioContext)();

    function beep(f,t,d) {
        const o=audio.createOscillator(), g=audio.createGain();
        o.type=t; o.frequency.value=f; g.gain.value=0.05;
        o.connect(g); g.connect(audio.destination);
        o.start(); o.stop(audio.currentTime+d);
    }

    function start() {
        pName=document.getElementById('name').value; pPass=document.getElementById('pw').value;
        if(!pName || !pPass) return alert("Required / 入力必須");
        document.getElementById('start-screen').style.display='none';
        stg=0; score=0; time=3000; live=true; load();
        if(!tid) tid=setInterval(tick, 10);
    }

    function tick() {
        if(!live) return;
        time--;
        timerEl.innerText = (time/100).toFixed(2);
        if(time<=1000) {
            document.body.classList.add('danger-pulse');
            timerEl.style.color='#ef4444';
            if(time%50===0) beep(60,'sine',0.1);
        } else {
            document.body.classList.remove('danger-pulse');
            timerEl.style.color='#fff';
        }
        if(time<=0) end(false);
    }

    function load() {
        area.innerHTML=""; found=0;
        const s=STAGES[stg];
        document.getElementById('stg').innerText=`STAGE ${stg+1} / 25`;
        
        if(s.s==='ch') {
            const wrap = document.createElement('div');
            wrap.className = "flex h-full w-full items-center justify-around";
            const b1=document.createElement('button'); b1.className="w-24 h-24 bg-red-600 rounded-full font-bold shadow-xl"; b1.innerText="RED";
            const b2=document.createElement('button'); b2.className="w-24 h-24 bg-blue-600 rounded-full font-bold shadow-xl"; b2.innerText="BLUE";
            const ok=Math.random()>0.5?b1:b2;
            b1.onclick=()=>b1===ok?next():end(false); b2.onclick=()=>b2===ok?next():end(false);
            wrap.append(b1,b2); area.append(wrap);
        } else if(s.s==='sp') {
            const h_zone = 5;
            for(let i=0; i<h_zone; i++){
                const h=document.createElement('div'); h.className="emoji target"; h.style.left=Math.random()*85+5+"%"; h.style.top=Math.random()*85+5+"%";
                h.style.width="50px"; h.style.height="50px"; h.style.border="2px dashed #999"; h.style.borderRadius="50%";
                h.onclick=()=>{ h.style.background="rgba(34,197,94,0.5)"; h.onclick=null; found++; if(found>=h_zone) next(); }; area.append(h);
            }
        } else {
            for(let i=0;i<s.c;i++) {
                const n=document.createElement('div'); n.className="emoji noise"; n.innerText=s.n[i%s.n.length];
                n.style.left=Math.random()*92+"%"; n.style.top=Math.random()*92+"%";
                if(s.s==='s') n.classList.add('yellow-coin'); // コインをイエローに
                n.onclick=()=>{ time=Math.max(0,time-300); beep(100,'sawtooth',0.1); }; area.append(n);
            }
            s.t.forEach(t=>{
                const g=document.createElement('div'); g.className="emoji target"; g.innerText=t;
                g.style.left=Math.random()*85+5+"%"; g.style.top=Math.random()*85+5+"%";
                if(s.s==='mi') g.style.transform="scaleX(-1)";
                if(s.s==='uf') g.style.opacity="0.1";
                g.onclick=(e)=>{ e.stopPropagation(); g.style.display='none'; found++; beep(880,'sine',0.1); if(found>=s.t.length) next(); };
                area.append(g);
            });
        }
    }

    function next() {
        score+=time; confetti(); stg++;
        if(stg>=STAGES.length) end(true); else load();
    }

    function end(w) {
        live=false;
        const o=document.createElement('div'); o.className="fixed inset-0 bg-black/95 z-[60000] flex flex-col items-center justify-center p-6 text-center";
        o.innerHTML=w?`<h1 class="text-5xl text-yellow-400 font-black mb-4">CLEAR!</h1><p class="text-2xl">Score: ${score}</p><div class="bg-zinc-800 p-4 mt-4 rounded-lg text-left w-64 border border-zinc-600"><p class="text-xs text-zinc-400 font-bold">NAME: ${pName}</p><p class="text-xs text-zinc-400 font-bold">PASS: ${pPass}</p></div><p class="text-xs text-red-500 mt-6 font-bold italic underline">Screenshot this screen for verification</p><button onclick="location.reload()" class="mt-8 bg-white text-black px-12 py-3 rounded-full font-bold">TITLE</button>`
                    :`<h1 class="text-5xl text-red-600 font-black mb-4 italic">TIME UP</h1><button onclick="location.reload()" class="mt-8 bg-red-600 text-white px-12 py-3 rounded-full font-bold shadow-lg">RETRY</button>`;
        document.body.append(o);
    }
</script>
</body>
</html>
