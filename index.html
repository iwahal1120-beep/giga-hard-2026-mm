<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIGA-HARD Challenge RT (25 Stages Edition)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; user-select: none; margin: 0; }
        #game-area { height: calc(100vh - 120px); position: relative; background: #d1d5db; overflow: hidden; }

        /* 10秒前威嚇演出 */
        .danger-mode #game-area { animation: menace-pink 0.1s infinite alternate !important; }
        .danger-mode #timer { color: #ff0000 !important; transform: scale(1.1); font-weight: 900; text-shadow: 0 0 12px rgba(255,0,0,0.6); }
        @keyframes menace-pink { 0% { background: #d1d5db; } 100% { background: #ff1493; } }

        .emoji { position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .target { z-index: 10000; font-size: 1.6rem; } 
        .noise { z-index: 100; font-size: 1.3rem; opacity: 0.9; }

        /* 特殊スタイル */
        .small-clown { transform: scale(0.7) !important; }
        .black-text { color: #000 !important; -webkit-text-fill-color: #000 !important; font-weight: bold; }
        .yellow-dot { color: #facc15 !important; -webkit-text-fill-color: #facc15 !important; font-size: 2.2rem; }
        .yellow-star { color: #fbce03 !important; -webkit-text-fill-color: #fbce03 !important; }
        
        /* 止まっている四角用のノイズ振動 */
        @keyframes vibration { 0% { transform: translate(0,0); } 100% { transform: translate(2px, 1px); } }
        .shaking-noise { animation: vibration 0.05s infinite; color: #4b5563; }
    </style>
</head>
<body id="main-body">

<div id="start-screen" class="fixed inset-0 z-[50000] p-6 flex flex-col items-center overflow-y-auto bg-black">
    <div class="max-w-md w-full flex flex-col items-center">
        <h1 class="text-4xl font-black text-yellow-400 mb-6 italic uppercase">GIGA-HARD 25</h1>
        <div class="bg-zinc-900 p-4 rounded-xl text-[10px] space-y-3 mb-6 border border-zinc-700 text-zinc-300">
            <p class="text-white font-bold uppercase">Mission: Total 25 Stages</p>
            <p>全てのステージを攻略し、伝説のスコアを刻め。</p>
            <a href="https://ofuse.me/d33e72b9" target="_blank" class="block bg-orange-600 text-white text-center py-2 rounded-lg font-bold uppercase">OFUSE PASS</a>
        </div>
        <input type="text" id="name" placeholder="Name" class="w-full p-4 rounded-xl bg-zinc-800 mb-2 border border-zinc-600 outline-none text-white">
        <input type="text" id="pw" placeholder="OFUSE PW" class="w-full p-4 rounded-xl bg-zinc-800 mb-6 border border-zinc-600 outline-none text-white">
        <button onclick="start()" class="w-full bg-red-700 py-5 rounded-2xl font-black text-2xl active:scale-95 italic uppercase">CHALLENGE START</button>
    </div>
</div>

<header class="h-[120px] bg-black flex flex-col justify-center px-6 border-b border-zinc-800">
    <div class="flex justify-between text-xs font-bold italic text-zinc-400">
        <span id="stg" class="text-red-600">STAGE</span>
        <span id="target-text"></span>
    </div>
    <div id="timer" class="text-6xl font-mono font-black text-center tabular-nums">30.00</div>
</header>

<main id="game-area"></main>

<script>
    const STAGES = [
        {m:"人間を探せ", t:["🙋‍♂️"], n:["🐶","🐱","🐭"], c:600},
        {m:"猫を探せ", t:["🐱"], n:["🧔","👵","👦"], c:600},
        {m:"自転車を探せ", t:["🚲"], n:["🚗","🚌","🚙"], c:500},
        {m:"クッキーを探せ", t:["🍪"], n:["🍬","🍭","🍩"], c:600},
        {m:"銀貨5個探せ", t:["🥈","🥈","🥈","🥈","🥈"], n:["●"], c:400, s:"s"}, // 修正反映
        {m:"ピエロを探せ", t:["🤡"], n:["💃","👱‍♀️"], c:600, s:"clown"},
        {m:"国旗10個探せ", t:["🇯🇵","🇺🇸","🇫🇷","🇮🇹","🇨🇳","🇷🇺","🇬🇧","🇩🇪","🇰🇷","🇪🇸"], n:["🌍","🌎"], c:600}, // 修正反映
        {m:"骨を探せ", t:["🦴"], n:["🐟","🐠"], c:650},
        {m:"ピンクの花を探せ", t:["🌸"], n:["⭐"], c:700, s:"flower"}, // 修正反映
        {m:"逆あを5個探せ", t:["あ","あ","あ","あ","あ"], n:["あ"], c:450, s:"mi"},
        {m:"鳥居を探せ", t:["⛩"], n:["🏢","🏣"], c:650},
        {m:"チェリーを探せ", t:["🍒"], n:["🍎"], c:700},
        {m:"虫を探せ", t:["🐛"], n:["🍃","🌱"], c:650},
        {m:"カップを探せ", t:["🏆"], n:["⚽","🏀"], c:650},
        {m:"バナナを探せ", t:["🍌"], n:["🌙"], c:700},
        {m:"パンダを探せ", t:["🐼"], n:["🐨","🦁","🐯"], c:600},
        {m:"タコを探せ", t:["🐙"], n:["🦑"], c:700},
        {m:"UFOを探せ", t:["🛸"], n:["✨","🌟"], c:800, s:"uf"},
        {m:"ソフトクリームを5個", t:["🍦","🍦","🍦","🍦","🍦"], n:["🍭"], c:600},
        {m:"バグを探せ", t:["👾"], n:["📱","💻","💾"], c:750},
        {m:"女性5人探せ", t:["💃","💃","💃","💃","💃"], n:["🧔"], c:700},
        {m:"止まっている四角5個", t:["■","■","■","■","■"], n:["■"], c:500, s:"sq"},
        {m:"ひよこ5匹探せ", t:["🐥","🐥","🐥","🐥","🐥"], n:["🐓"], c:550},
        {m:"運命の二択", s:"ch"},
        {m:"切れているところ5個", s:"sp"}
    ];

    let stg=0, time=3000, tid=null, found=0, score=0, live=false;
    const area=document.getElementById('game-area'), timerEl=document.getElementById('timer'), stgEl=document.getElementById('stg'), txtEl=document.getElementById('target-text'), bodyEl=document.getElementById('main-body');
    const audio = new (window.AudioContext || window.webkitAudioContext)();

    function start() {
        if(!document.getElementById('name').value || !document.getElementById('pw').value) return alert("Required");
        document.getElementById('start-screen').style.display='none';
        stg=0; score=0; live=true; loadStage();
        if(!tid) tid=setInterval(tick, 10);
    }

    function tick() {
        if(!live) return;
        time--;
        timerEl.innerText = (time/100).toFixed(2);
        if(time <= 1000) {
            bodyEl.classList.add('danger-mode');
            if(time % 100 === 0) { const o=audio.createOscillator(); const g=audio.createGain(); o.frequency.value=440; g.gain.value=0.03; o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime+0.05); }
        } else { bodyEl.classList.remove('danger-mode'); }
        if(time <= 0) endGame(false);
    }

    function loadStage() {
        area.innerHTML=""; found=0; time=3000;
        bodyEl.classList.remove('danger-mode');
        const s = STAGES[stg];
        stgEl.innerText=`STAGE ${stg+1}/${STAGES.length}`;
        txtEl.innerText = s.m;

        if(s.s==='ch') {
            const wrap = document.createElement('div'); wrap.className = "flex h-full w-full items-center justify-around";
            const ok = Math.random()>0.5;
            ["RED","BLUE"].forEach((c, i) => {
                const b=document.createElement('button'); b.className=`w-24 h-24 bg-${c.toLowerCase()}-600 rounded-full font-black`; b.innerText=c;
                b.onclick=()=>{ (i===0 && ok) || (i===1 && !ok) ? nextStage() : endGame(false); }; wrap.append(b);
            });
            area.append(wrap);
        } else if(s.s==='sp') {
            for(let i=0; i<5; i++){
                const h=document.createElement('div'); h.className="emoji target"; h.style.left=Math.random()*85+5+"%"; h.style.top=Math.random()*85+5+"%";
                h.style.width="35px"; h.style.height="35px"; h.style.border="3px dashed #ef4444"; h.style.borderRadius="50%";
                h.onclick=()=>{ h.style.background="rgba(34,197,94,0.6)"; h.onclick=null; found++; if(found>=5) nextStage(); }; area.append(h);
            }
        } else {
            for(let i=0; i<s.c; i++) {
                const n=document.createElement('div'); n.className="emoji noise";
                n.innerText=s.n[i%s.n.length];
                n.style.left=Math.random()*94+"%"; n.style.top=Math.random()*94+"%";
                if(s.s==='s') n.classList.add('yellow-dot');
                if(s.s==='flower') n.classList.add('yellow-star');
                if(s.s==='sq') n.classList.add('shaking-noise');
                n.onclick=()=>{ time=Math.max(0,time-300); }; area.append(n);
            }
            s.t.forEach(emoji => {
                const g=document.createElement('div'); g.className="emoji target"; g.innerText=emoji;
                g.style.left=Math.random()*90+2+"%"; g.style.top=Math.random()*90+2+"%";
                if(s.s==='clown') g.classList.add('small-clown');
                if(s.s==='mi') { g.classList.add('black-text'); g.style.transform="scaleX(-1)"; }
                if(s.s==='uf') g.style.opacity="0.3";
                g.onclick=(e)=>{ e.stopPropagation(); g.style.visibility='hidden'; found++; if(found >= s.t.length) nextStage(); };
                area.append(g);
            });
        }
    }

    function nextStage() {
        score += time;
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        stg++;
        if(stg >= STAGES.length) endGame(true); else loadStage();
    }

    function endGame(win) {
        live=false;
        const o=document.createElement('div'); o.className="fixed inset-0 bg-black/95 z-[60000] flex flex-col items-center justify-center p-8 text-center";
        o.innerHTML=win?`<h1 class='text-5xl text-yellow-400 font-black mb-4 italic'>COMPLETE</h1><p class='text-lg'>Score: ${score}</p><button onclick='location.reload()' class='mt-10 bg-white text-black px-16 py-4 rounded-full font-black'>TITLE</button>`:`<h1 class='text-7xl text-red-600 font-black mb-8 italic uppercase'>TIME UP</h1><button onclick='location.reload()' class='bg-red-600 text-white px-16 py-5 rounded-full font-black uppercase'>RETRY</button>`;
        document.body.append(o);
    }
</script>
</body>
</html>
